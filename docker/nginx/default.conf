server {
    listen 8080;
    server_name www.coffeepowered.co.uk;

    return 301 https://coffeepowered.co.uk$request_uri;
}

server {
    listen 8080;
    server_name coffeepowered.co.uk;

    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;
    autoindex off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-XSS-Protection "0" always;
    add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; object-src 'none'; frame-ancestors 'none'; form-action 'self' mailto:; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; frame-src https://www.youtube.com https://www.youtube-nocookie.com; connect-src 'self'; upgrade-insecure-requests" always;

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* /(docker|\.git|\.github|\.env|Makefile|docker-compose\.yml|package(-lock)?\.json|index\.html\.1)$ {
        deny all;
    }

    location / {
        limit_except GET HEAD OPTIONS { deny all; }
        try_files $uri $uri/index.html $uri/ /index.html;
    }

    location ~* \.(?:html|css|js)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires -1;
        try_files $uri =404;
    }
}

server {
    listen 8080 default_server;
    server_name _;

    return 444;
}
